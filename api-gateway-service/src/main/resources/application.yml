server:
  port:
    8300
spring:
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8400
          predicates:
             - Path=/user/**
          filters:
          - AuthenticationFilter
        - id: auth-service
          uri: http://localhost:8100
          predicates:
            - Path=/auth/*
          filters:
            - AuthenticationFilter
        - id: product-service
          uri: http://localhost:8200
          predicates:
            - Path=/product/*
          filters:
            - AuthenticationFilter
        - id: product-service-admin
          uri: http://localhost:8200
          predicates:
            - Path=/product/admin/**,/product/sku/admin/**
          filters:
            - AuthenticationFilter
            - name: RoleFilter
              args:
                allowedRoles: ROLE_admin
        - id: inventory-service-admin
          uri: http://localhost:8400
          predicates:
            - Path=/api/inventories/**
          filters:
            - AuthenticationFilter
            - name: RoleFilter
              args:
                allowedRoles: ROLE_admin
        - id: cart-service
          uri: http://localhost:8500
          predicates:
            - Path=/api/cart/**
          filters:
            - name: AuthenticationFilter
              args:
                isTokenRequired: false

