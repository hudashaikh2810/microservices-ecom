spring.application.name=order-servie
server.port=8600
spring.config.import=optional:configserver:http://localhost:8888
eureka.client.service.defaultZone=http://localhost:8761/eureka
spring.datasource.url=jdbc:postgresql://localhost:5432/order
spring.datasource.username=postgres
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

resilience4j.circuitbreaker.instances.productService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.productService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.productService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.productService.waitDurationInOpenState=10s

resilience4j.timelimiter.instances.productService.timeoutDuration=2s
# Feign
feign.client.config.default.connectTimeout=2000
feign.client.config.default.readTimeout=2000

resilience4j.retry.instances.inventoryService.max-attempts=3
resilience4j.retry.instances.inventoryService.wait-duration=500ms

resilience4j.retry.instances.inventoryService.retry-exceptions=\
org.springframework.web.client.HttpServerErrorException,\
java.io.IOException,\
java.net.SocketTimeoutException


resilience4j.retry.instances.inventoryService.ignore-exceptions=\
org.springframework.web.client.HttpClientErrorException\,

